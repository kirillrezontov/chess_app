<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--panel:#16213e;--board-light:#ebecd0;--board-dark:#779556;
  --accent:#69a13a;--text:#e0e0e0;--text-dim:#888;--border:#2a2a4a;
  --selected:rgba(255,255,0,.45);--lastmove:rgba(155,199,0,.41);--check:radial-gradient(ellipse at center,rgb(127, 165, 77) 0%,rgb(100, 146, 39) 25%,rgba(169,0,0,0) 89%);
  --sq:60px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}
a{color:var(--accent);text-decoration:none}

/* ---------- screens ---------- */
.screen{display:none;min-height:100vh}.screen.active{display:flex}
#auth-screen{align-items:center;justify-content:center}
#lobby-screen,#game-screen{flex-direction:column;align-items:center;padding:20px}

/* ---------- auth ---------- */
.auth-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:32px;width:360px}
.auth-box h2{text-align:center;margin-bottom:20px;font-size:22px}
.auth-tabs{display:flex;margin-bottom:20px;border-bottom:2px solid var(--border)}
.auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;color:var(--text-dim);font-weight:600;transition:.2s}
.auth-tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.auth-form{display:none}.auth-form.active{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:4px}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;background:#0f3460;color:var(--text);font-size:14px;outline:none}
.field input:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-primary:hover{filter:brightness(1.15)}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:12px}
.error-msg{color:var(--accent);font-size:13px;margin-top:6px;min-height:18px}

/* ---------- lobby ---------- */
.lobby-header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:900px;margin-bottom:24px}
.lobby-header h1{font-size:20px}
.lobby-content{display:flex;gap:24px;width:100%;max-width:900px;flex:1}
.lobby-left{flex:1;display:flex;flex-direction:column;gap:16px}
.lobby-right{width:320px;display:flex;flex-direction:column;gap:16px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px}
.card h3{font-size:15px;margin-bottom:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.time-btns{display:flex;gap:8px;flex-wrap:wrap}
.time-btn{padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;font-size:14px;transition:.15s}
.time-btn.active,.time-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(233,69,96,.1)}
.find-btn{width:100%;padding:14px;font-size:16px}
.cancel-btn{width:100%;padding:14px;font-size:16px;background:#555;color:#fff}
.history-list{max-height:300px;overflow-y:auto}
.history-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-item .result{font-weight:700}
.result.win{color:#4caf50}.result.loss{color:var(--accent)}.result.draw{color:#ff9800}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;padding:6px 8px;color:var(--text-dim);border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid var(--border)}

/* ---------- game ---------- */
.game-header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:960px;margin-bottom:16px}
.game-layout{display:flex;gap:24px;align-items:flex-start}
.board-wrap{position:relative}
.board{display:grid;grid-template-columns:repeat(8,var(--sq));grid-template-rows:repeat(8,var(--sq));border:3px solid var(--border);border-radius:2px;overflow:hidden;user-select:none}
.square{width:var(--sq);height:var(--sq);display:flex;align-items:center;justify-content:center;font-size:calc(var(--sq)*.75);cursor:pointer;position:relative;transition:background .1s}
.square.light{background:var(--board-light)}.square.dark{background:var(--board-dark)}
.square.selected{background:var(--selected)!important}
.square.lastmove{background:var(--lastmove)!important}
.square.check::after{content:'';position:absolute;inset:0;background:var(--check);pointer-events:none}
.square:hover{filter:brightness(1.08)}
.piece{pointer-events:none;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.4);filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
.coords-file,.coords-rank{position:absolute;font-size:10px;font-weight:700;pointer-events:none}
.coords-file{bottom:1px;right:3px}.coords-rank{top:2px;left:3px}
.square.light .coords-file,.square.light .coords-rank{color:var(--board-dark)}
.square.dark .coords-file,.square.dark .coords-rank{color:var(--board-light)}
.game-info{width:280px;display:flex;flex-direction:column;gap:12px}
.player-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:8px}
.player-bar .name{font-weight:600;font-size:15px}
.player-bar .clock{font-family:'Courier New',monospace;font-size:22px;font-weight:700;min-width:80px;text-align:right}
.clock.low{color:var(--accent)}
.game-controls{display:flex;gap:8px}
.game-controls .btn{flex:1}
.move-list-wrap{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:340px;overflow-y:auto}
.move-list-wrap h3{font-size:13px;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.move-list{display:flex;flex-wrap:wrap;gap:2px 8px;font-size:13px;font-family:'Courier New',monospace}
.move-list .num{color:var(--text-dim);min-width:28px}
.game-status{padding:16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;text-align:center;font-size:15px;font-weight:600}
.game-status.over{border-color:var(--accent);color:var(--accent)}

/* ---------- promotion ---------- */
.promo-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.promo-overlay.active{display:flex}
.promo-box{background:var(--panel);border:2px solid var(--accent);border-radius:12px;padding:20px;text-align:center}
.promo-box h3{margin-bottom:16px}
.promo-pieces{display:flex;gap:8px}
.promo-piece{width:64px;height:64px;display:flex;align-items:center;justify-content:center;font-size:48px;background:var(--bg);border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:.15s}
.promo-piece:hover{border-color:var(--accent);background:rgba(233,69,96,.15)}
</style>
</head>
<body>

<!-- ======== AUTH ======== -->
<div id="auth-screen" class="screen active">
  <div class="auth-box">
    <h2>Chess</h2>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">Sign In</div>
      <div class="auth-tab" data-tab="register">Sign Up</div>
    </div>
    <form id="login-form" class="auth-form active">
      <div class="field"><label>Username</label><input type="text" id="login-user" required minlength="3"></div>
      <div class="field"><label>Password</label><input type="password" id="login-pass" required minlength="8"></div>
      <button class="btn btn-primary" type="submit">Sign In</button>
      <div class="error-msg" id="login-err"></div>
    </form>
    <form id="register-form" class="auth-form">
      <div class="field"><label>Username</label><input type="text" id="reg-user" required minlength="3"></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" required></div>
      <div class="field"><label>Password</label><input type="password" id="reg-pass" required minlength="8"></div>
      <button class="btn btn-primary" type="submit">Create Account</button>
      <div class="error-msg" id="reg-err"></div>
    </form>
  </div>
</div>

<!-- ======== LOBBY ======== -->
<div id="lobby-screen" class="screen">
  <div class="lobby-header">
    <h1>Chess</h1>
    <div>
      <span id="lobby-username" style="margin-right:12px"></span>
      <span id="lobby-rating" style="margin-right:16px;color:var(--text-dim)"></span>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
    </div>
  </div>
  <div class="lobby-content">
    <div class="lobby-left">
      <div class="card">
        <h3>Find a Game</h3>
        <div class="time-btns" id="time-btns">
          <button class="time-btn" data-time="60" data-inc="0">1+0</button>
          <button class="time-btn" data-time="180" data-inc="0">3+0</button>
          <button class="time-btn active" data-time="300" data-inc="0">5+0</button>
          <button class="time-btn" data-time="600" data-inc="0">10+0</button>
          <button class="time-btn" data-time="300" data-inc="3">5+3</button>
          <button class="time-btn" data-time="600" data-inc="5">10+5</button>
        </div>
        <div style="margin-top:16px">
          <button class="btn btn-primary find-btn" id="find-btn">Find Opponent</button>
          <button class="btn cancel-btn" id="cancel-btn" style="display:none">Cancel Search</button>
        </div>
        <div class="error-msg" id="queue-err"></div>
      </div>
    </div>
    <div class="lobby-right">
      <div class="card">
        <h3>Recent Games</h3>
        <div class="history-list" id="history-list"><span style="color:var(--text-dim);font-size:13px">No games yet</span></div>
      </div>
      <div class="card">
        <h3>Leaderboard</h3>
        <div id="leaderboard-wrap"><span style="color:var(--text-dim);font-size:13px">Loading...</span></div>
      </div>
    </div>
  </div>
</div>

<!-- ======== GAME ======== -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <h1 id="game-title">Game</h1>
    <button class="btn btn-secondary btn-sm" id="leave-btn">Leave Game</button>
  </div>
  <div class="game-layout">
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
    <div class="game-info">
      <div class="player-bar" id="top-player">
        <span class="name">Opponent</span>
        <span class="clock" id="top-clock">5:00</span>
      </div>
      <div class="player-bar" id="bottom-player">
        <span class="name">You</span>
        <span class="clock" id="bottom-clock">5:00</span>
      </div>
      <div class="game-status" id="game-status">Connecting...</div>
      <div class="game-controls" id="game-controls">
        <button class="btn btn-secondary btn-sm" id="draw-btn">Offer Draw</button>
        <button class="btn btn-primary btn-sm" id="resign-btn">Resign</button>
      </div>
      <div class="move-list-wrap">
        <h3>Moves</h3>
        <div class="move-list" id="move-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ======== PROMOTION ======== -->
<div class="promo-overlay" id="promo-overlay">
  <div class="promo-box">
    <h3>Promote to</h3>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<script>
// ===================== CONFIG =====================
const API = '';
const WS_BASE = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;

// ===================== STATE =====================
let token = sessionStorage.getItem('chess_token');
let username = sessionStorage.getItem('chess_username');
let userId = sessionStorage.getItem('chess_user_id');
let rating = 0;
let myColor = '';
let gameId = null;
let ws = null;
let selectedSquare = null;
let pendingPromo = null;
let queuePoll = null;
let selectedTime = 300;
let selectedInc = 0;
let currentSnapshot = null;

// ===================== PIECES =====================
const PIECE_CHAR = {
  K:'\u2654',Q:'\u2655',R:'\u2656',B:'\u2657',N:'\u2658',P:'\u2659',
  k:'\u265A',q:'\u265B',r:'\u265C',b:'\u265D',n:'\u265E',p:'\u265F'
};

// ===================== HELPERS =====================
function api(method, path, body) {
  const opts = { method, headers: {} };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  return fetch(API + path, opts).then(r => r.json());
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formatClock(ms) {
  if (ms <= 0) return '0:00';
  const totalSec = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

// ===================== AUTH =====================
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab + '-form').classList.add('active');
  });
});

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  try {
    const data = await api('POST', '/api/login', { username: u, password: p });
    if (data.error) { document.getElementById('login-err').textContent = data.error; return; }
    token = data.token; userId = data.user_id; username = data.username; rating = data.rating || 0;
    sessionStorage.setItem('chess_token', token);
    sessionStorage.setItem('chess_username', username);
    sessionStorage.setItem('chess_user_id', userId);
    enterLobby();
  } catch (err) { document.getElementById('login-err').textContent = 'Connection error'; }
});

document.getElementById('register-form').addEventListener('submit', async e => {
  e.preventDefault();
  const u = document.getElementById('reg-user').value.trim();
  const em = document.getElementById('reg-email').value.trim();
  const p = document.getElementById('reg-pass').value;
  try {
    const data = await api('POST', '/api/register', { username: u, email: em, password: p });
    if (data.error) { document.getElementById('reg-err').textContent = data.error; return; }
    token = data.token; userId = data.user_id; username = u; rating = 0;
    sessionStorage.setItem('chess_token', token);
    sessionStorage.setItem('chess_username', username);
    sessionStorage.setItem('chess_user_id', userId);
    enterLobby();
  } catch (err) { document.getElementById('reg-err').textContent = 'Connection error'; }
});

document.getElementById('logout-btn').addEventListener('click', () => {
  token = null; username = null; userId = null;
  sessionStorage.removeItem('chess_token');
  sessionStorage.removeItem('chess_username');
  sessionStorage.removeItem('chess_user_id');
  if (ws) { ws.close(); ws = null; }
  showScreen('auth-screen');
});

// ===================== LOBBY =====================
async function enterLobby() {
  showScreen('lobby-screen');
  document.getElementById('lobby-username').textContent = username;
  loadHistory();
  loadLeaderboard();
  loadMe();
}

async function loadMe() {
  try {
    const data = await api('GET', '/api/me');
    if (data.username) {
      rating = data.rating || 0;
      document.getElementById('lobby-rating').textContent = 'Rating: ' + rating;
    }
  } catch(e) {}
}

async function loadHistory() {
  try {
    const data = await api('GET', '/api/history');
    const el = document.getElementById('history-list');
    if (!Array.isArray(data) || data.length === 0) {
      el.innerHTML = '<span style="color:var(--text-dim);font-size:13px">No games yet</span>';
      return;
    }
    el.innerHTML = data.slice(0, 20).map(g => {
      let cls = 'draw', txt = 'Draw';
      if (g.outcome === 'white_win') {
        const isWhite = g.white_id == userId;
        cls = isWhite ? 'win' : 'loss'; txt = isWhite ? 'Won' : 'Lost';
      } else if (g.outcome === 'black_win') {
        const isBlack = g.black_id == userId;
        cls = isBlack ? 'win' : 'loss'; txt = isBlack ? 'Won' : 'Lost';
      }
      return '<div class="history-item"><span>vs ' + (g.white_username || '?') + ' vs ' + (g.black_username || '?') + '</span><span class="result ' + cls + '">' + txt + '</span></div>';
    }).join('');
  } catch(e) {}
}

async function loadLeaderboard() {
  try {
    const data = await api('GET', '/api/leaderboard');
    const el = document.getElementById('leaderboard-wrap');
    if (!Array.isArray(data) || data.length === 0) {
      el.innerHTML = '<span style="color:var(--text-dim);font-size:13px">No players yet</span>';
      return;
    }
    let html = '<table><tr><th>#</th><th>Player</th><th>W</th><th>L</th><th>D</th><th>Rating</th></tr>';
    data.slice(0, 20).forEach((p, i) => {
      html += '<tr><td>' + (i+1) + '</td><td>' + p.username + '</td><td>' + (p.wins||0) + '</td><td>' + (p.losses||0) + '</td><td>' + (p.draws||0) + '</td><td>' + (p.rating||0) + '</td></tr>';
    });
    html += '</table>';
    el.innerHTML = html;
  } catch(e) {}
}

// Time control buttons
document.getElementById('time-btns').addEventListener('click', e => {
  const btn = e.target.closest('.time-btn');
  if (!btn) return;
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTime = parseInt(btn.dataset.time);
  selectedInc = parseInt(btn.dataset.inc);
});

// Find opponent
document.getElementById('find-btn').addEventListener('click', async () => {
  document.getElementById('find-btn').style.display = 'none';
  document.getElementById('cancel-btn').style.display = '';
  document.getElementById('queue-err').textContent = '';
  try {
    const data = await api('POST', '/api/queue', {
      initial_time_sec: selectedTime,
      increment_sec: selectedInc
    });
    if (data.error) {
      document.getElementById('queue-err').textContent = data.error;
      document.getElementById('find-btn').style.display = '';
      document.getElementById('cancel-btn').style.display = 'none';
      return;
    }
    pollQueue(data.ticket_id);
  } catch(e) {
    document.getElementById('queue-err').textContent = 'Failed to join queue';
    document.getElementById('find-btn').style.display = '';
    document.getElementById('cancel-btn').style.display = 'none';
  }
});

document.getElementById('cancel-btn').addEventListener('click', () => {
  if (queuePoll) { clearInterval(queuePoll); queuePoll = null; }
  document.getElementById('find-btn').style.display = '';
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('queue-err').textContent = '';
});

function pollQueue(ticketId) {
  queuePoll = setInterval(async () => {
    try {
      const data = await api('GET', '/api/queue/' + ticketId);
      if (data.status === 'matched' && data.game_id) {
        clearInterval(queuePoll); queuePoll = null;
        gameId = data.game_id;
        enterGame();
      }
    } catch(e) {}
  }, 1000);
}

// ===================== GAME =====================
async function enterGame() {
  showScreen('game-screen');
  document.getElementById('find-btn').style.display = '';
  document.getElementById('cancel-btn').style.display = 'none';
  selectedSquare = null;
  pendingPromo = null;
  document.getElementById('game-controls').style.display = '';
  renderBoard('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1', null, false, false);

  const wsUrl = WS_BASE + '/ws/games/' + gameId + '?token=' + encodeURIComponent(token);
  ws = new WebSocket(wsUrl);
  ws.onopen = () => console.log('WS connected to game', gameId);
  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch(e) { return; }
    if (msg.type === 'snapshot') {
      handleSnapshot(msg.state);
    } else if (msg.type === 'error') {
      console.warn('WS error:', msg.error);
    }
  };
  ws.onerror = (e) => console.error('WS error', e);
  ws.onclose = () => console.log('WS closed');
}

function handleSnapshot(state) {
  currentSnapshot = state;

  if (!myColor && state.game_id) {
    fetchGameInfo();
  }

  renderBoard(state.fen, state.last_move, state.in_check, state.outcome !== '');
  updateClocks(state.white_clock_ms, state.black_clock_ms);
  updateMoveList(state.move_list);
  updateStatus(state.status, state.outcome, state.turn);
}

async function fetchGameInfo() {
  try {
    const data = await api('GET', '/api/games/' + gameId);
    if (data) {
      if (data.white_id == userId) myColor = 'white';
      else if (data.black_id == userId) myColor = 'black';
      updatePlayerNames(data);
    }
  } catch(e) {}
}

function updatePlayerNames(gameData) {
  const topName = document.querySelector('#top-player .name');
  const bottomName = document.querySelector('#bottom-player .name');
  if (myColor === 'white') {
    bottomName.textContent = (gameData.white_username || username) + ' (W)';
    topName.textContent = (gameData.black_username || 'Opponent') + ' (B)';
  } else {
    bottomName.textContent = (gameData.black_username || username) + ' (B)';
    topName.textContent = (gameData.white_username || 'Opponent') + ' (W)';
  }
}

function updateClocks(whiteMs, blackMs) {
  const topClock = document.getElementById('top-clock');
  const bottomClock = document.getElementById('bottom-clock');
  const topIsBlack = myColor === 'white';
  const topMs = topIsBlack ? blackMs : whiteMs;
  const bottomMs = topIsBlack ? whiteMs : blackMs;
  topClock.textContent = formatClock(topMs);
  bottomClock.textContent = formatClock(bottomMs);
  topClock.classList.toggle('low', topMs < 30000);
  bottomClock.classList.toggle('low', bottomMs < 30000);
}

function updateMoveList(moves) {
  const el = document.getElementById('move-list');
  if (!moves || moves.length === 0) { el.innerHTML = ''; return; }
  let html = '';
  for (let i = 0; i < moves.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    html += '<span><span class="num">' + num + '.</span>' + moves[i];
    if (moves[i + 1]) html += ' ' + moves[i + 1];
    html += '</span>';
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function updateStatus(status, outcome, turn) {
  const el = document.getElementById('game-status');
  const ctrl = document.getElementById('game-controls');
  if (outcome) {
    el.classList.add('over');
    ctrl.style.display = 'none';
    if (outcome === 'white_win') el.textContent = myColor === 'white' ? 'You won!' : 'You lost.';
    else if (outcome === 'black_win') el.textContent = myColor === 'black' ? 'You won!' : 'You lost.';
    else if (outcome === 'draw') el.textContent = 'Draw.';
    else el.textContent = 'Game over: ' + outcome;
    return;
  }
  el.classList.remove('over');
  ctrl.style.display = '';
  const myTurn = turn === myColor;
  if (status === 'checkmate') {
    el.textContent = 'Checkmate!';
  } else if (status === 'stalemate') {
    el.textContent = 'Stalemate - Draw';
  } else if (status === 'check') {
    el.textContent = myTurn ? 'Check! Your turn.' : "Check! Opponent's turn.";
  } else {
    el.textContent = myTurn ? 'Your turn' : "Opponent's turn";
  }
}

// ===================== BOARD RENDERING =====================
function parseFEN(fen) {
  const rows = fen.split(' ')[0].split('/');
  const board = [];
  for (let r = 0; r < 8; r++) {
    board[r] = [];
    let col = 0;
    for (const ch of rows[r]) {
      if (ch >= '1' && ch <= '8') {
        for (let i = 0; i < parseInt(ch); i++) board[r][col++] = '';
      } else {
        board[r][col++] = ch;
      }
    }
  }
  return board;
}

function sqName(row, col) {
  return String.fromCharCode(97 + col) + (8 - row);
}

function renderBoard(fen, lastMove, inCheck, isOver) {
  const board = parseFEN(fen);
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';

  let kingPos = null;
  if (inCheck && myColor) {
    const kingChar = myColor === 'white' ? 'K' : 'k';
    for (let r = 0; r < 8; r++)
      for (let c = 0; c < 8; c++)
        if (board[r][c] === kingChar) kingPos = { r: r, c: c };
  }

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = document.createElement('div');
      const isLight = (r + c) % 2 === 0;
      sq.className = 'square ' + (isLight ? 'light' : 'dark');
      const name = sqName(r, c);
      sq.dataset.square = name;

      if (selectedSquare === name) sq.classList.add('selected');
      if (lastMove && (name === lastMove.from || name === lastMove.to)) sq.classList.add('lastmove');
      if (kingPos && kingPos.r === r && kingPos.c === c) sq.classList.add('check');

      const piece = board[r][c];
      if (piece) {
        const span = document.createElement('span');
        span.className = 'piece';
        span.textContent = PIECE_CHAR[piece] || piece;
        sq.appendChild(span);
      }

      if (c === 0) {
        const rank = document.createElement('span');
        rank.className = 'coords-rank';
        rank.textContent = 8 - r;
        sq.appendChild(rank);
      }
      if (r === 7) {
        const file = document.createElement('span');
        file.className = 'coords-file';
        file.textContent = String.fromCharCode(97 + c);
        sq.appendChild(file);
      }

      sq.addEventListener('click', (() => {
        const capturedName = name;
        const capturedPiece = piece;
        return () => onSquareClick(capturedName, capturedPiece);
      })());

      boardEl.appendChild(sq);
    }
  }
}

function onSquareClick(name, piece) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (!currentSnapshot || currentSnapshot.outcome) return;
  if (!myColor) return;
  if (pendingPromo) return;

  const isMyTurn = currentSnapshot.turn === myColor;
  if (!isMyTurn) return;

  if (selectedSquare) {
    if (name === selectedSquare) {
      selectedSquare = null;
      rerenderBoard();
      return;
    }
    const fromRow = 8 - parseInt(selectedSquare[1]);
    const toRow = 8 - parseInt(name[1]);
    const selPiece = getPieceAt(selectedSquare);
    if (selPiece) {
      const isPawnPromo = (myColor === 'white' && selPiece === 'P' && toRow === 0) ||
                          (myColor === 'black' && selPiece === 'p' && toRow === 7);
      if (isPawnPromo) {
        pendingPromo = { from: selectedSquare, to: name };
        showPromotion(myColor);
        selectedSquare = null;
        return;
      }
    }
    sendMove(selectedSquare, name, '');
    selectedSquare = null;
  } else {
    if (!piece) return;
    const isWhite = piece === piece.toUpperCase();
    if ((myColor === 'white' && isWhite) || (myColor === 'black' && !isWhite)) {
      selectedSquare = name;
      rerenderBoard();
    }
  }
}

function getPieceAt(sq) {
  if (!currentSnapshot) return null;
  const board = parseFEN(currentSnapshot.fen);
  const col = sq.charCodeAt(0) - 97;
  const row = 8 - parseInt(sq[1]);
  return board[row][col];
}

function rerenderBoard() {
  if (!currentSnapshot) return;
  renderBoard(currentSnapshot.fen, currentSnapshot.last_move, currentSnapshot.in_check, currentSnapshot.outcome !== '');
}

function sendMove(from, to, promotion) {
  ws.send(JSON.stringify({ type: 'move', from: from, to: to, promotion: promotion }));
}

// ===================== PROMOTION =====================
function showPromotion(color) {
  const overlay = document.getElementById('promo-overlay');
  const pieces = document.getElementById('promo-pieces');
  const list = color === 'white' ? ['Q','R','B','N'] : ['q','r','b','n'];
  let html = '';
  list.forEach(p => {
    html += '<div class="promo-piece" data-promo="' + p.toLowerCase() + '">' + PIECE_CHAR[p] + '</div>';
  });
  pieces.innerHTML = html;
  overlay.classList.add('active');

  function handler(e) {
    const el = e.target.closest('.promo-piece');
    if (!el) return;
    const promo = el.dataset.promo;
    overlay.classList.remove('active');
    pieces.removeEventListener('click', handler);
    sendMove(pendingPromo.from, pendingPromo.to, promo);
    pendingPromo = null;
  }
  pieces.addEventListener('click', handler);
}

// ===================== GAME CONTROLS =====================
document.getElementById('resign-btn').addEventListener('click', () => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'resign' }));
  }
});

document.getElementById('draw-btn').addEventListener('click', () => {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'offer_draw' }));
  }
});

document.getElementById('leave-btn').addEventListener('click', () => {
  if (ws) { ws.close(); ws = null; }
  gameId = null; myColor = ''; currentSnapshot = null; selectedSquare = null;
  enterLobby();
});

// ===================== INIT =====================
if (token) {
  api('GET', '/api/me').then(data => {
    if (data.error) {
      sessionStorage.removeItem('chess_token');
      token = null;
      showScreen('auth-screen');
    } else {
      if (data.username) username = data.username;
      if (data.rating !== undefined) rating = data.rating;
      if (data.user_id) userId = data.user_id;
      enterLobby();
    }
  }).catch(() => {
    showScreen('auth-screen');
  });
} else {
  showScreen('auth-screen');
}
