version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess
    volumes:
      - chess-db-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgres://chess:chess@db:5432/chess?sslmode=disable
      JWT_SECRET: change-me-in-production
      LISTEN_ADDR: ":8080"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    # For the "container-per-game" scaling model instead of goroutines,
    # this service becomes the matchmaking/API frontdoor only, and it would
    # `docker run` short-lived game-runner containers per match instead of
    # `go func(){ session.Run() }()`. See docker/README.md.
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://frontend:80
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  chess-db-data:
